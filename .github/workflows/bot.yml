name: SignalBharat Bot

on:
  schedule:
    # Pre-market 9:00 AM IST = 3:30 UTC
    - cron: '30 3 * * 1-5'
    # Market open 9:16 AM IST = 3:46 UTC
    - cron: '46 3 * * 1-5'
    # Scans every 15 min (9:30 AM to 3:15 PM IST)
    - cron: '0 4 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '45 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '15 5 * * 1-5'
    - cron: '30 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '15 7 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '45 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '15 8 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '45 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '15 9 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '45 9 * * 1-5'
    # Market close 3:31 PM IST = 10:01 UTC
    - cron: '1 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
